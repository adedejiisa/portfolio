<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000A23">
    <link rel="icon" type="image/png" href="/uploads/favicon.png">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="profile.css">
</head>
<body>

  <div class="coverer">

    <div class="sub-coverer">

  <!-- Profile Placeholder-->
  <div class="profile-placeholder">
    <a href="settings.html"><svg id="hamburgerIcon" class="hamburger" width="24" height="24" viewBox="0 0 24 24"
     fill="none" xmlns="http://www.w3.org/2000/svg"
     stroke="#000A23" stroke-width="2" stroke-linecap="round">

  <line x1="3" y1="6" x2="21" y2="6"/>
  <line x1="3" y1="12" x2="21" y2="12"/>
  <line x1="3" y1="18" x2="21" y2="18"/>

</svg></a>

   <button id="openPublicViewSettings" class="openPublicViewSettings">︙</button>   

    <h2 id="fullName">Full Name</h2><span id="country">🌍</span>
    <div class="profile-avatar">
      <img id="profilePic" src="https://afrisocial-backend.onrender.com/uploads/images/africa.png" alt="profile picture">
    </div>
    <span id="username">@username</span><svg id="verifiedBadge" class="verified-badge" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" fill="#1DA1F2"/>
      <path d="M9 12l2 2 4-4" stroke="white" stroke-width="2" fill="none"/>
    </svg>
  </div>

  <!-- profile action botton -->
   <div class="profile-action-button">

    <!-- Public View -->
    <div class="public-view">
    <button id="followBtn" style="display: none; background-color: dodgerblue; color: white;">Follow</button>
    <button id="messageBtn" type="button">Message</button>
    </div>
       
     <!-- Owner View -->
     <div class="owner-view">
      <button id="openEditContainer" style="border: 2px solid dodgerblue; color: white; background-color: dodgerblue;">Edit Profile</button>
     </div>

   </div>

   <!-- Profile Stats -->
    <div class="profile-stats">

   <div class="followers-stats">
    <span id="followersCount" style="font-weight: bold;">0</span>
    <span id="openFollowersTab">followers</span>
   </div>

   <div class="following-stats">
    <span id="followingCount" style="font-weight: bold;">0</span> 
    <span id="openFollowingTab">following</span>
   </div>

   <div class="love-stats">
    <span id="likesCount" style="font-weight: bold;">0</span>
    <span><svg width="30" height="30" viewBox="0 0 24 24" fill="none">
  <path d="M12.1 8.64l-.1.1-.11-.1C10.14 6.6 7.1 6.24 5.1 8.3c-2 2.06-2 5.4 0 7.46L12 22l6.9-6.24c2-2.06 2-5.4 0-7.46-2-2.06-5.04-1.7-6.8.34z" 
        stroke="red" stroke-width="2" fill="red"/>
</svg></span>
   </div>

   <div class="starup-stats">
    <span id="starsCount" style="font-weight: bold;">0</span>
    <span> <svg class="star" width="30" height="30" viewBox="0 0 24 24" fill="none">
  <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"
        stroke="#FFA310" stroke-width="2" fill="#FFA310"/>
</svg></span>
   </div>

   </div>

   <!-- users bio -->
   <section class="bio">
    <p id="bio"></p>
   </section>

    <p class="joined" id="joined">Joined: --</p>
          

    </div>

    <!-- EDIT PROFILE FORM -->
<div class="edit-profile-container" id="editContainer">
  <span id="closeEditContainer">&times;</span>
  <h2>Edit Profile</h2>
  <form id="editProfileForm">
    <!-- Profile Image -->
    <div class="edit-image-section">
     
      <img data-user-profile src="https://afrisocial-backend.onrender.com/uploads/images/africa.png" alt="profile picture" id="profilePreview">
      <label class="change-picture">
        Add picture
        <input type="file" accept="image/*" id="profileImage" name="profilePicture">
      </label>
        
    </div>

    <!-- Full Name -->
    <label>Full Name</label>
    <input type="text" placeholder="Enter your name" id="editFullName" required>

    <!-- Username -->
    <label>Username</label>
    <input type="text" placeholder="@username" id="editUsername" required>

    <!-- Bio -->
    <label>Bio</label>
    <input placeholder="Tell us about yourself..." id="editBio">

    <!-- Country -->
    <label>Country</label>
    <select id="editCountry">
      <option value="">-- Select Your Country --</option>
<option value="dz">🇩🇿 Algeria</option>
<option value="ao">🇦🇴 Angola</option>
<option value="bj">🇧🇯 Benin</option>
<option value="bw">🇧🇼 Botswana</option>
<option value="bf">🇧🇫 Burkina Faso</option>
<option value="bi">🇧🇮 Burundi</option>
<option value="cv">🇨🇻 Cape Verde</option>
<option value="cm">🇨🇲 Cameroon</option>
<option value="cf">🇨🇫 Central African Republic</option>
<option value="td">🇹🇩 Chad</option>
<option value="km">🇰🇲 Comoros</option>
<option value="cd">🇨🇩 Democratic Republic of the Congo</option>
<option value="cg">🇨🇬 Republic of the Congo</option>
<option value="ci">🇨🇮 Côte d’Ivoire</option>
<option value="dj">🇩🇯 Djibouti</option>
<option value="eg">🇪🇬 Egypt</option>
<option value="gq">🇬🇶 Equatorial Guinea</option>
<option value="er">🇪🇷 Eritrea</option>
<option value="sz">🇸🇿 Eswatini</option>
<option value="et">🇪🇹 Ethiopia</option>
<option value="ga">🇬🇦 Gabon</option>
<option value="gm">🇬🇲 Gambia</option>
<option value="gh">🇬🇭 Ghana</option>
<option value="gn">🇬🇳 Guinea</option>
<option value="gw">🇬🇼 Guinea-Bissau</option>
<option value="ke">🇰🇪 Kenya</option>
<option value="ls">🇱🇸 Lesotho</option>
<option value="lr">🇱🇷 Liberia</option>
<option value="ly">🇱🇾 Libya</option>
<option value="mg">🇲🇬 Madagascar</option>
<option value="mw">🇲🇼 Malawi</option>
<option value="ml">🇲🇱 Mali</option>
<option value="mr">🇲🇷 Mauritania</option>
<option value="mu">🇲🇺 Mauritius</option>
<option value="ma">🇲🇦 Morocco</option>
<option value="mz">🇲🇿 Mozambique</option>
<option value="na">🇳🇦 Namibia</option>
<option value="ne">🇳🇪 Niger</option>
<option value="ng">🇳🇬 Nigeria</option>
<option value="rw">🇷🇼 Rwanda</option>
<option value="st">🇸🇹 São Tomé and Príncipe</option>
<option value="sn">🇸🇳 Senegal</option>
<option value="sc">🇸🇨 Seychelles</option>
<option value="sl">🇸🇱 Sierra Leone</option>
<option value="so">🇸🇴 Somalia</option>
<option value="za">🇿🇦 South Africa</option>
<option value="ss">🇸🇸 South Sudan</option>
<option value="sd">🇸🇩 Sudan</option>
<option value="tz">🇹🇿 Tanzania</option>
<option value="tg">🇹🇬 Togo</option>
<option value="tn">🇹🇳 Tunisia</option>
<option value="ug">🇺🇬 Uganda</option>
<option value="zm">🇿🇲 Zambia</option>
<option value="zw">🇿🇼 Zimbabwe</option>
             </select>
    <!-- Save Change Button -->
    <button id="saveProfileBtn">Save Change</button>
  </form>
</div>


     <!-- Followers tab -->
    <div class="followers-tab" id="followersTab">
      <span id="closeFollowersTab">&times;</span>
      <h2>followers</h2>
      <input type="search" placeholder="search followers...">
      <div class="followers-tab-container">
        <div id="followersList"></div>
      </div>
    </div>

    <!-- Following tab -->
     <div class="following-tab" id="followingTab">
      <span id="closeFollowingTab">&times;</span>
      <h2>following</h2>
      <input type="search" placeholder="search following...">
      <Div class="following-tab-container">
        <div id="followingList"></div>
      </Div>
     </div>

     <!-- Public view settings -->
      <div class="public-view-settings" id="publicViewSettings">
        <ul>
          <li style="color: red;">Block this user</li>
          <li style="color: red;">Report this user</li>
          <li id="closePublicViewSettings" class="closePublicViewSettings">Cancel</li>
        </ul>
      </div>

      <!-- Profile Tab -->
      <div class="profile-tabs">
  <button class="tab-btn active" data-tab="posts">Posts</button>
  <button class="tab-btn" data-tab="explore">Explore</button>
</div>

<div class="profile-tab-content">
  <div id="postsTab" class="tab-content active"></div>
  <div id="exploreTab" class="tab-content"></div>
</div>

      <!-- Comment modal -->
    <div id="commentModal" class="comment-modal">
  <div class="comment-box">
    <div class="comment-header">
      <h3>Comments</h3>
      <span id="closeCommentModal">&times;</span>
    </div>

    <div id="commentList" class="comment-list">
      <!-- comments go here -->
    </div>

    <div class="comment-input">
      <input
        type="text"
        id="commentInput"
        placeholder="Write a comment..."
      />
      <button id="sendCommentBtn">Send</button>
    </div>
  </div>
</div>

      <div id="notificationBox"></div>

     <footer>
        <nav class="feed-nav-bottom">
            <!-- Home SVG pth here -->
             <a href="feed.html"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#000A23" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M4 10.5C4 9.9 4.3 9.3 4.8 8.9L11.3 3.7C11.7 3.4 12.3 3.4 12.7 3.7L19.2 8.9C19.7 9.3 20 9.9 20 10.5V18.5C20 19.6 19.1 20.5 18 20.5H6C4.9 20.5 4 19.6 4 18.5V10.5Z"/>
  <path d="M9 20.5V14.5C9 13.9 9.4 13.5 10 13.5H14C14.6 13.5 15 13.9 15 14.5V20.5" />
</svg><span>Home</span></a>
            <!-- Explore SVG path here -->
            <a href="explore.html" ><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#000A23" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="12" cy="12" r="10"/>
  <polygon points="16 8 14 14 8 16 10 10 16 8"/>
</svg><span>AfriExplore</span></a>
            <!-- Vybze SVG path here -->
  <a href="/vybze.html" class="nav-item vybze-nav">
<svg class="vybze-icon" viewBox="0 0 24 24">
<path d="M13 3s1 3-1 5c-2 2-3 3-3 5a4 4 0 0 0 8 0c0-3-3-5-4-10z"/>
</svg><span>Vybze</span>
</a>          
            <!-- Message SVG path here -->
             <a href="message.html"><svg id="messageIcon" width="32" height="32" viewBox="0 0 24 24" fill="none" 
     stroke="#000A23" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">  
  <!-- Speech bubble outline -->
  <path d="M12 3C7 3 3.5 6.3 3.5 10.5C3.5 14.8 6.8 17.5 10 18.2V21
           C10 21.5 10.5 21.8 11 21.5L13.8 19.7C17.8 19.4 20.5 16.2 20.5 12
           C20.5 6.9 17 3 12 3Z" />
  <!-- Message zig-zag shape -->
  <path d="M8 12L11 10L13.5 12L16 10" />
</svg><span>Messages</span><span id="messageBadge" class="badge">0</span></a>
           <!-- Notification SVG path path here -->
            <a href="notification.html"><svg id="notificationBtn" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#000A23" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
  <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
</svg><span>Notifications</span><span id="notificationBadge" class="notification-badge">0</span></a>
           <!-- Profile SVG path here -->
            <a href="profile.html"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" 
     stroke="#000A23" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer Circle -->
  <circle cx="12" cy="12" r="10" />
  <!-- Head -->
  <circle cx="12" cy="9" r="3" />
  <!-- Shoulders -->
  <path d="M6.5 18C7.5 15.5 9.7 14 12 14C14.3 14 16.5 15.5 17.5 18" />
</svg><span>Profile</span></a>
        </nav>
    </footer>
    </div>

    <div class="overlay hidden" id="overlay"></div> 
    <script src="/main.js" type="module"></script>
     <script src="js/theme.js"></script>
     <script src="profile.js"></script>
</body>

</html>
